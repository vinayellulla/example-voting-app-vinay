apiVersion: apps/v1
kind: Deployment
metadata:
  labels: 
    app: result
  name: result

spec:
  replicas: 1
  selector: 
     matchLabels:
       app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: dockersamples/examplevotingapp_result
        name: result
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_HOST
          value: db 