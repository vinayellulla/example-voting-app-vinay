apiVersion: apps/v1
kind: Deployment
metadata:
   labels:
      app: db
   name: db
spec:
   replicas: 1
   selector:
      matchLabels:
         app: db
   template:
     metadata:
        labels:
          app: db
     spec:
       containers:
       - image: postgres:15-alpine
         name: postgres
         env:
         - name: POSTGRES_USER
           valueFrom:
             secretKeyRef:
               name: postgres-secret 
               key: username
         - name: POSTGRES_PASSWORD
           valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: password
           
         - name: POSTGRES_DB
           valueFrom:
               secretKeyRef:
                  name: postgres-secret
                  key: database
         ports:
         - containerPort: 5432
           name: postgres
         volumeMounts:
         - mountPath: /var/lib/postgresql/data
           name: db-data
       volumes:
       - name: db-data
         emptyDir: {}
        

           

           

          
         
      
        

