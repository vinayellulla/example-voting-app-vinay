# Just adding for testing github actions
# Just adding for testing github actions

name: deploy to EKS 

on: 
  push: 
    branches:
    - main

env: 
  AWS_REGION: ap-southeast-2
  EKS_CLUSTER_NAME: voting-app
  ECR_VOTE: voting-app/vote
  ECR_RESULT: voting-app/result
  ECR_WORKER: voting-app/worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: configure AWS credentials 
      uses: aws-actions/configure-aws-credentials@v4
      with: 
         role-to-assume: ${{secrets.AWS_ROLE_ARN}}
         aws-region: ${{env.AWS_REGION}}

    - name: Login to ECR
      id: login-ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push vote
      env: 
        ECR_REGISTRY: ${{steps.login-ecr.outputs.registry}}
        IMAGE_TAG: ${{github.sha}}
      run: | 
        docker build -t $ECR_REGISTRY/$ECR_VOTE:$IMAGE_TAG ./vote
        docker push $ECR_REGISTRY/$ECR_VOTE:$IMAGE_TAG

    - name: Build and push result
      env:
        ECR_REGISTRY: ${{steps.login-ecr.outputs.registry}}
        IMAGE_TAG: ${{github.sha}}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_RESULT:$IMAGE_TAG ./result
        docker push $ECR_REGISTRY/$ECR_RESULT:$IMAGE_TAG

    - name: Build and push worker
      env: 
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_WORKER:$IMAGE_TAG ./worker
        docker push $ECR_REGISTRY/$ECR_WORKER:$IMAGE_TAG

  deploy:
     runs-on: ubuntu-latest
     needs: build-and-push
     permissions: 
       id-token: write
       contents: read
     
     steps:
     - name: Checkout code
       uses: actions/checkout@v4

     - name: Configure AWS credentials
       uses: aws-actions/configure-aws-credentials@v4
       with: 
         role-to-assume: ${{secrets.AWS_ROLE_ARN}}
         aws-region: ${{env.AWS_REGION}}
     
     - name: Update kubeconfig
       run: | 
         aws eks update-kubeconfig \
           --region ${{ env.AWS_REGION }} \
           --name ${{ env.EKS_CLUSTER_NAME }}

     - name: Update image tag in manifests
       env: 
         ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
         IMAGE_TAG: ${{ github.sha }}

       run: |
         sed -i "s|dockersamples/examplevotingapp_vote|$ECR_REGISTRY/$ECR_VOTE:$IMAGE_TAG|g" k8s/vote-deployment.yaml
         sed -i "s|dockersamples/examplevotingapp_result|$ECR_REGISTRY/$ECR_RESULT:$IMAGE_TAG|g" k8s/result-deployment.yaml
         sed -i "s|dockersamples/examplevotingapp_worker|$ECR_REGISTRY/$ECR_WORKER:$IMAGE_TAG|g" k8s/worker-deployment.yaml

     - name: Deploy to EKS 
       run: |
         kubectl apply -f k8s/postgres-secret.yaml
         kubectl apply -f k8s/postgres-deployment.yaml
         kubectl apply -f k8s/postgres-service.yaml
         kubectl apply -f k8s/redis-deployment.yaml
         kubectl apply -f k8s/redis-service.yaml
         kubectl apply -f k8s/worker-deployment.yaml
         kubectl apply -f k8s/vote-deployment.yaml
         kubectl apply -f k8s/vote-service.yaml
         kubectl apply -f k8s/result-deployment.yaml
         kubectl apply -f k8s/result-service.yaml 

     - name: Verify deployment
       run: |
         kubectl rollout status deployment/vote
         kubectl rollout status deployment/result
         kubectl rollout status deployment/worker
